# Candidate models, addressed by their OpenRouter slug.
#
# Curated for the commit-message hook task: small-to-mid instruction-tuned
# models with decent code understanding, fast latency, and per-commit cost
# under ~$0.01. Anything Sonnet-tier or larger is intentionally excluded —
# this hook fires on every git commit, so ergonomics matter more than raw
# capability ceilings.
#
# Slugs verified live against /api/v1/models on 2026-04-06.

defaults:
  concurrency: 4
  max_tokens: 500
  temperature: 0.2

models:
  - slug: anthropic/claude-haiku-4.5
    notes: Anthropic Haiku 4.5 — small flagship, strong structured output
  - slug: openai/gpt-5-mini
    notes: OpenAI GPT-5 mini tier
  - slug: openai/gpt-5-nano
    notes: OpenAI GPT-5 nano tier — ultra cheap
  - slug: google/gemini-2.5-flash
    notes: Google Gemini 2.5 Flash
  - slug: google/gemini-2.5-flash-lite
    notes: Google Gemini 2.5 Flash Lite — cheaper variant
  - slug: deepseek/deepseek-v3.2
    notes: DeepSeek V3.2 — strong code model, original hook default
  - slug: qwen/qwen3-coder-30b-a3b-instruct
    notes: Qwen3 Coder 30B A3B — code-specialized
  - slug: z-ai/glm-4.5-air
    notes: Z.ai GLM 4.5 Air
  - slug: openai/gpt-oss-120b
    notes: OpenAI gpt-oss 120B — ultra cheap baseline
  - slug: mistralai/mistral-small-3.2-24b-instruct
    notes: Mistral Small 3.2 24B
