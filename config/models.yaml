# Candidate models, addressed by their OpenRouter slug.
# The :free suffix routes through OpenRouter's free tier.
#
# `concurrency` is the max in-flight requests for that provider in the runner.
# `max_tokens` overrides AI_COMMIT_MAX_TOKENS for that model (optional).
# `notes` is free-form metadata for the report.

defaults:
  concurrency: 4
  max_tokens: 500
  temperature: 0.2

free:
  # Slugs verified live against /api/v1/models on 2026-04-06.
  # Two models is enough to validate the harness; expand later in Phase C.
  - slug: openai/gpt-oss-120b:free
    notes: OpenAI gpt-oss 120B (free tier)
  - slug: z-ai/glm-4.5-air:free
    notes: GLM 4.5 Air (free tier)

paid:
  # Populate after Phase B shakedown is green. Examples:
